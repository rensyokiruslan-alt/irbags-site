<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>оформление — irbags</title>
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/checkout.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

  <main class="checkout-main" id="checkoutMain">

    <!-- ─── ЛЕВАЯ КОЛОНКА (sticky) ──────────────────────────────────────── -->
    <div class="checkout-left" id="checkoutLeft">

      <!-- Назад: left=20, top=20 -->
      <button class="checkout-back" id="checkoutBackBtn" type="button">назад в магазин</button>

      <!-- Контактная информация: left=20, top=220 -->
      <div class="checkout-contact">
        <span class="checkout-label">контактная информация</span>
        <div class="checkout-contact__fields">
          <input class="checkout-field" id="checkoutPhone"
                 type="tel" placeholder="телефон" inputmode="numeric" autocomplete="tel">
          <input class="checkout-field" id="checkoutEmail"
                 type="email" placeholder="почта" autocomplete="email">
        </div>
      </div>

      <!-- Доставка: left=20, top=430 -->
      <div class="checkout-delivery">
        <span class="checkout-label">доставка</span>
        <div class="checkout-options" id="checkoutDeliveryOptions">
          <button class="checkout-option is-active" type="button" data-value="курьером">
            <span class="checkout-option__circle"></span>
            <span class="checkout-option__text">курьером</span>
          </button>
          <button class="checkout-option" type="button" data-value="такси">
            <span class="checkout-option__circle"></span>
            <span class="checkout-option__text">такси</span>
          </button>
          <button class="checkout-option" type="button" data-value="самовывоз">
            <span class="checkout-option__circle"></span>
            <span class="checkout-option__text">самовывоз</span>
          </button>
        </div>
      </div>

      <!-- Поля получателя: left=20, top=655 -->
      <div class="checkout-person" id="checkoutPerson">
        <input class="checkout-field" id="checkoutFirstName"
               type="text" placeholder="имя" autocomplete="given-name">
        <input class="checkout-field" id="checkoutLastName"
               type="text" placeholder="фамилия" autocomplete="family-name">
        <input class="checkout-field" id="checkoutAddress"
               type="text" placeholder="адрес">
        <input class="checkout-field" id="checkoutCity"
               type="text" placeholder="город">
      </div>

      <!-- Оплата: left=495, top=430 -->
      <div class="checkout-payment">
        <span class="checkout-label">способ оплаты</span>
        <div class="checkout-options" id="checkoutPaymentOptions">
          <button class="checkout-option is-active" type="button" data-value="онлайн">
            <span class="checkout-option__circle"></span>
            <span class="checkout-option__text">онлайн</span>
          </button>
          <button class="checkout-option" type="button" data-value="при получении">
            <span class="checkout-option__circle"></span>
            <span class="checkout-option__text">при получении</span>
          </button>
          <button class="checkout-option" type="button" data-value="рассрочка">
            <span class="checkout-option__circle"></span>
            <span class="checkout-option__text">рассрочка</span>
          </button>
        </div>
      </div>

    </div><!-- /checkout-left -->

    <!-- ─── ПРАВАЯ КОЛОНКА (скроллится) ────────────────────────────────── -->
    <div class="checkout-right" id="checkoutRight">

      <!-- Товары (read-only) -->
      <div class="checkout-items" id="checkoutItems"></div>

      <!-- Итого: offset left=158px (1445−1287) -->
      <div class="checkout-total">
        <div class="checkout-total__row checkout-total__row--sum">
          <span>итого</span>
          <span id="checkoutTotalPrice">0 €</span>
        </div>
        <div class="checkout-total__row checkout-total__row--delivery">
          <span>доставка</span>
          <span id="checkoutDeliveryValue">курьером</span>
        </div>
      </div>

      <!-- Действия: offset left=158px -->
      <div class="checkout-actions">
        <label class="checkout-agree">
          <input class="checkout-agree__checkbox" id="checkoutAgree" type="checkbox">
          <span class="checkout-agree__text">
            <span class="checkout-agree__muted">я прочитала и согласна с условиями</span>
            <a class="checkout-agree__link" href="privacy.html" target="_blank"> доставки, оплаты и возврата</a>
          </span>
        </label>
        <button class="checkout-submit" id="checkoutSubmit" type="button" disabled>оформить заказ</button>
      </div>

    </div><!-- /checkout-right -->

  </main>

  <script src="js/scale.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
