<!DOCTYPE html>
<html lang="ru">

      <a href="cart.html" class="site-header__cart">

  <main class="contacts-main">

      <span class="site-footer__copy">
        <span>©</span>
        <span>irbags</span>
        <span>2025</span>
      </span>
      <span class="site-footer__credit">
        <span>сделано</span>
        <a href="https://lookatmira.com" target="_blank" rel="noopener" class="site-footer__credit-link">lookatmira</a>

        <button class="site-mob-menu__search-submit" type="submit">найти</button>

      <button class="site-mob-menu__search-btn" id="siteMobMenuSearchBtn" type="button">поиск</button>
